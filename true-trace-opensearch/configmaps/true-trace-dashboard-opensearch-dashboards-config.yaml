apiVersion: v1
data:
  opensearch_dashboards.yml: |
    server.name: os_dashboards
    server.host: "0.0.0.0"

    server.basePath: "/_dashboards"
    server.rewriteBasePath: true

    opensearch.username: "admin"
    opensearch.password: "admin"

    # Encrypt traffic between the browser and OpenSearch-Dashboards
    server.ssl.enabled: true
    server.ssl.certificate: "/usr/share/opensearch-dashboards/config/certs/tls.pem"
    server.ssl.key: "/usr/share/opensearch-dashboards/config/certs/tls.key"

    # Encrypt traffic between OpenSearch-Dashboards and Opensearch
    opensearch.ssl.certificateAuthorities: ["/usr/share/opensearch-dashboards/config/certs/ca.pem"]
    opensearch.ssl.verificationMode: full

    # --- Security plugin: OpenID (Cognito) ---
    opensearch_security.auth.type: ["basicauth","openid"]
    opensearch_security.auth.multiple_auth_enabled: true
    opensearch_security.openid.connect_url: "https://cognito-idp.eu-west-1.amazonaws.com/eu-west-1_5pRf7YrLW/.well-known/openid-configuration"
    opensearch_security.openid.client_id: "1jf8lvbm2mrmkjfn8m8li9i3th"
    opensearch_security.openid.client_secret: "1r9jr5o95n3e04us1pq128s485p5q5nhddp2coo3lrn99487j8ul"
    opensearch_security.openid.scope: "openid profile email"
    opensearch_security.openid.base_redirect_url: "https://qa-pps-truetrace.pps.co.za/_dashboards"
    opensearch_security.openid.logout_url: "https://eu-west-15prf7yrlw.auth.eu-west-1.amazoncognito.com/logout"
    opensearch_security.multitenancy.enabled: true
    opensearch_security.multitenancy.tenants.preferred: ["Private","Global"]
    opensearch_security.cookie.secure: true
    opensearch_security.cookie.name: "oidc"
    opensearch_security.openid.refresh_tokens: false


    opensearch.hosts:
     - "https://opensearch-cluster-master:9200"

    opensearchDashboards.branding:
      applicationTitle: "iCrypto True Trace"
      logo:
         defaultUrl: "/ui/assets/logo-default.png"
         darkModeUrl: "/ui/assets/logo-dark.png"
      mark:
         defaultUrl: "/ui/assets/mark-default.png"
         darkModeUrl: "/ui/assets/mark-dark.png"
      loadingLogo:
         defaultUrl: "/ui/assets/loading-logo-default.png"
         darkModeUrl: "/ui/assets/loading-logo-dark.png"
      faviconUrl: "/ui/assets/favicon.png"
kind: ConfigMap
metadata:
  annotations:
    argocd.argoproj.io/tracking-id: true-trace-dashboard:/ConfigMap:logging/true-trace-dashboard-opensearch-dashboards-config
